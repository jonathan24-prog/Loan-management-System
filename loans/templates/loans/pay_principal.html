{% extends 'loans/base.html' %} {% block content %}
<div class="container mt-4">
  <h2>Pay Principal for {{ loan.customer.full_name }}</h2>
  <div class="card p-3 shadow-sm">
    <p><strong>Original Principal:</strong> ₱ {{ loan.loan_amount }}</p>
    <p>
      <strong>Remaining Principal:</strong> ₱ {{ loan.remaining_principal }}
    </p>

    <form method="POST">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit" class="btn btn-success">Pay Principal</button>
      <a
        href="{% url 'customer_detail' loan.customer.pk %}"
        class="btn btn-secondary"
        >Cancel</a
      >
    </form>
  </div>
</div>
{% endblock %}
