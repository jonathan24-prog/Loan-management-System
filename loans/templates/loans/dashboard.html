{% extends 'loans/base.html' %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4 text-primary">Dashboard</h2>
    <p class="lead">Welcome to your Loan Management System. Here’s a quick overview:</p>

    <div class="row mt-4">
        <!-- Total Customers Card -->
        <div class="col-md-4">
            <div class="card text-white bg-primary shadow-sm mb-3" style="border-radius: 12px;">
                <div class="card-body d-flex align-items-center">
                    <div class="me-3">
                        <i class="bi bi-people-fill" style="font-size: 2.5rem;"></i>
                    </div>
                    <div>
                        <h5 class="card-title">Total Customers</h5>
                        <p class="card-text fs-3 fw-bold">{{ total_customers }}</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Future Cards for Loans, Payments, etc. -->
        <div class="col-md-4">
            <div class="card text-white bg-success shadow-sm mb-3" style="border-radius: 12px;">
                <div class="card-body d-flex align-items-center">
                    <div class="me-3">
                        <i class="bi bi-cash-stack" style="font-size: 2.5rem;"></i>
                    </div>
                    <div>
                        <h5 class="card-title">Active Loans</h5>
                        <p class="card-text fs-3 fw-bold">{{ total_loans }}</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-warning shadow-sm mb-3" style="border-radius: 12px;">
                <div class="card-body d-flex align-items-center">
                    <div class="me-3">
                        <i class="bi bi-check2-square" style="font-size: 2.5rem;"></i>
                    </div>
                    <div>
                        <h5 class="card-title">Payments Made</h5>
                        <p class="card-text fs-3 fw-bold">{{ total_payments }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
