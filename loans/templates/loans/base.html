<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Dashboard</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href='https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #111827;
            color: #fff;
            padding-top: 20px;
            transition: 0.3s;
            z-index: 1050;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: #fff;
        }

        .sidebar .active {
            background: #2563eb;
            color: #fff;
        }

        .sidebar i {
            margin-right: 10px;
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 0 20px;
        }

        .close-sidebar {
            font-size: 28px;
            cursor: pointer;
            display: none;
            color: white;
        }

        /* Topbar */
        .topbar {
            margin-left: 240px;
            height: 60px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .topbar img {
            width: 35px;
            border-radius: 50%;
        }

        .menu-toggle {
            font-size: 24px;
            cursor: pointer;
            display: none;
        }

        /* Content */
        .main-content {
            margin-left: 240px;
            padding: 20px;
            transition: 0.3s;
        }

        /* Overlay background for mobile */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 1040;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: -240px;
            }

            .sidebar.active {
                left: 0;
            }

            .topbar {
                margin-left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .close-sidebar {
                display: block;
            }
        }
    </style>

    {% block css_block %}{% endblock %}
</head>

<body>

    <!-- Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <!-- Sidebar Header -->
        <div class="sidebar-header d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0">Admin Panel</h5>
            <i class='bx bx-x close-sidebar' id="close-sidebar"></i>
        </div>

        <a href="{% url 'dashboard' %}"
        class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class='bx bx-grid-alt'></i> Dashboard
        </a>

        <a href="{% url 'customers' %}"
        class="{% if request.resolver_match.url_name == 'customers' %}active{% endif %}">
            <i class='bx bx-user'></i> Customers
        </a>

       <a href="{% url 'dashboard' %}"
        class="{% if request.resolver_match.url_name == 'transactions' %}active{% endif %}">
            <i class='bx bx-bar-chart-alt-2'></i> Transactions
        </a>

        <a href="{% url 'login' %}">
            <i class='bx bx-log-out'></i> Logout
        </a>
    </div>

    <!-- Topbar -->
    <div class="topbar">
        <i class='bx bx-menu menu-toggle' id="menu-toggle"></i>
        <h6 class="mb-0">Admin Dashboard</h6>
        <img src="https://i.pravatar.cc/100" alt="">
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- JS -->
    <script>
        const toggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        // Open sidebar
        toggle.addEventListener('click', () => {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        });

        // Close sidebar button
        closeSidebar.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        // Close when clicking overlay
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block block_js %}{% endblock %}

</body>
</html>
