{% extends 'loans/base.html' %}

{% block content %}

<div class="container mt-4">

    <h3>Pay Loan - {{ loan.full_name }}</h3>

    <p>Remaining Balance: <strong>{{ loan.remaining_balance }}</strong></p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.amount.label_tag }}
            {{ form.amount }}
        </div>

        <button class="btn btn-primary">
            Submit Payment
        </button>
    </form>

</div>

{% endblock %}
